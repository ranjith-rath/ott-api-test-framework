[pytest]
markers =
    smoke: quick critical-path checks, run on every commit
    regression: full suite, run nightly or before release
    negative: error-handling and edge-case scenarios

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
